services:
  - type: web
    name: expense-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false          # Значение вводите вручную в Render Dashboard
      - key: SPREADSHEET_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SHEET_NAME
        value: Лист1
    healthCheckPath: /health
